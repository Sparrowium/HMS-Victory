# Authentication methods for your devices
auths:
  # A common auth for SNMP v2 using the 'public' community string
  public_v2:
    version: 2
    community: public

# Modules define a set of metrics (OIDs) to walk for a specific device type
modules:
  # A basic module that collects common interface metrics
  if_mib:
    walk:
      # These OIDs correspond to standard network interface statistics
      - 1.3.6.1.2.1.2          # interfaces
      - 1.3.6.1.2.1.31.1.1     # ifXTable (64-bit counters)
    get:
      # This OID gets the system's uptime
      - 1.3.6.1.2.1.1.3.0      # sysUpTime
    max_repetitions: 25
    retries: 3
    timeout: 5s
    auth: public_v2

  # You can add more modules for other device types (e.g., Cisco, APC UPS)
  # cisco:
  #   walk:
  #     - 1.3.6.1.4.1.9.2.1     # Example OID for Cisco environmental monitor
  #   auth: private_auth
