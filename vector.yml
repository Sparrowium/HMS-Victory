# Define where Vector gets its data
sources:
  # Collect logs from all running Docker containers
  docker_logs:
    type: docker_logs
    # Exclude Vector and VictoriaLogs containers to avoid feedback loops
    exclude_containers:
      - vector
      - victorialogs

# Define where Vector sends the data
sinks:
  # Send logs to VictoriaLogs using the Elasticsearch-compatible API
  vlogs:
    type: elasticsearch
    inputs:
      - docker_logs
    endpoints:
      - http://victorialogs:9428/insert/elasticsearch/
    api_version: v8
    compression: gzip
    healthcheck:
      enabled: false
    query:
      # Map Vector's log fields to VictoriaLogs' data model
      _msg_field: message      # The log line itself
      _time_field: timestamp   # The timestamp of the log
      _stream_fields: host,container_name # Fields used for fast filtering
