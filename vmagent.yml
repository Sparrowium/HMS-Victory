global:
  scrape_interval: 15s
  external_labels:
    monitor: 'docker-monitor'

scrape_configs:
  # Scrape vmagent's own metrics
  - job_name: 'vmagent'
    static_configs:
      - targets: ['localhost:8429']

  # Scrape metrics from the host system via Node Exporter
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']


