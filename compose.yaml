services:
  # --------------------------------------------------------------------------
  # VictoriaMetrics – time‑series database
  # --------------------------------------------------------------------------
  victoriametrics:
    image: victoriametrics/victoria-metrics:latest
    container_name: victoriametrics
    restart: unless-stopped
    networks:
      - monitoring
      - proxy
    volumes:
      - ./storage/victoriametrics:/victoria-metrics-data
    command:
      - '-storageDataPath=/victoria-metrics-data'
      - '-retentionPeriod=${VM_RETENTION_PERIOD}'
      - '-httpListenAddr=${VM_HTTP_LISTEN_ADDR}'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8428/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # VictoriaLogs – log storage
  # --------------------------------------------------------------------------
  victorialogs:
    image: victoriametrics/victoria-logs:latest
    container_name: victorialogs
    restart: unless-stopped
    networks:
      - monitoring
      - proxy
    volumes:
      - ./storage/victorialogs:/victoria-logs-data
    command:
      - '-storageDataPath=/victoria-logs-data'
      - '-httpListenAddr=${VLOG_HTTP_LISTEN_ADDR}'

  # --------------------------------------------------------------------------
  # vmagent – metrics scraper & forwarder
  # --------------------------------------------------------------------------
  vmagent:
    image: victoriametrics/vmagent:latest
    container_name: vmagent
    restart: unless-stopped
    networks:
      - monitoring
      - proxy
    volumes:
      - ./vmagent.yml:/etc/vmagent/vmagent.yml:ro
    command:
      - '-promscrape.config=/etc/vmagent/vmagent.yml'
      - '-remoteWrite.url=http://victoriametrics:8428/api/v1/write'
    depends_on:
      - victoriametrics


  # --------------------------------------------------------------------------
  # Vector – log collector (ships to VictoriaLogs)
  # --------------------------------------------------------------------------
  vector:
    image: timberio/vector:nightly-debian
    container_name: vector
    restart: unless-stopped
    user: root                              # required for reading host logs & docker socket
    networks:
      - monitoring
      - proxy
    volumes:
      - ./vector.yml:/etc/vector/vector.yml:ro
      - /var/log:/var/log:ro
      - ./test-logs:/test-logs:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: ["--config", "/etc/vector/vector.yml"]

  # --------------------------------------------------------------------------
  # Node Exporter – host metrics
  # --------------------------------------------------------------------------
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    networks:
      - monitoring
      - proxy
    user: root
    privileged: true
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.rapl'

  # --------------------------------------------------------------------------
  # SNMP Exporter – network device metrics
  # --------------------------------------------------------------------------
  snmp-exporter:
    image: prom/snmp-exporter:latest
    container_name: snmp-exporter
    restart: unless-stopped
    networks:
      - monitoring
      - proxy
    # Port binding removed – service communicates internally over Docker networks.
    # If external SNMP polling is required, add back "127.0.0.1:9116:9116"
    volumes:
      - ./snmp.yml:/etc/snmp_exporter/snmp.yml:ro
    command:
      - "--config.file=/etc/snmp_exporter/snmp.yml"

  # --------------------------------------------------------------------------
  # Grafana – dashboards
  # --------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    networks:
      - monitoring
      - proxy
    environment:
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL}
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - ./storage/grafana-data:/var/lib/grafana
    depends_on:
      - victoriametrics	

  # --------------------------------------------------------------------------
  # LibreNMS – database (MariaDB)
  # --------------------------------------------------------------------------
  librenms-db:
    image: mariadb:10.11
    container_name: librenms-db
    restart: unless-stopped
    networks:
      - monitoring
      - proxy
    volumes:
      - ./storage/librenms-db:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: librenms
      MYSQL_USER: librenms
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command:
      - "mysqld"
      - "--innodb-file-per-table=1"
      - "--lower-case-table-names=0"
      - "--character-set-server=utf8mb4"
      - "--collation-server=utf8mb4_unicode_ci"
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # LibreNMS – cache (Redis)
  # --------------------------------------------------------------------------
  librenms-redis:
    image: redis:7-alpine
    container_name: librenms-redis
    restart: unless-stopped
    networks:
      - monitoring
      - proxy
    volumes:
      - ./storage/librenms-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # --------------------------------------------------------------------------
  # LibreNMS – main application
  # --------------------------------------------------------------------------
  librenms:
    image: librenms/librenms:latest
    container_name: librenms
    restart: unless-stopped
    networks:
      - monitoring
      - proxy
    depends_on:
      librenms-db:
        condition: service_healthy
      librenms-redis:
        condition: service_healthy
    environment:
      - DB_HOST=librenms-db
      - DB_NAME=librenms
      - DB_USER=librenms
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - DB_TIMEOUT=60
      - REDIS_HOST=librenms-redis
      - REDIS_PORT=6379
      - BASE_URL=${BASE_URL}
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
    volumes:
      - librenms-data:/data
      - librenms-rrd:/opt/librenms/rrd

  # --------------------------------------------------------------------------
  # LibreNMS – dispatcher (polling worker)
  # --------------------------------------------------------------------------
  librenms-dispatcher:
    image: librenms/librenms:latest
    container_name: librenms-dispatcher
    hostname: librenms-dispatcher
    restart: unless-stopped
    networks:
      - monitoring
      - proxy
    depends_on:
      librenms:
        condition: service_started
      librenms-redis:
        condition: service_healthy
    environment:
      - DB_HOST=librenms-db
      - DB_NAME=librenms
      - DB_USER=librenms
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - DB_TIMEOUT=60
      - REDIS_HOST=librenms-redis
      - REDIS_PORT=6379
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - DISPATCHER_NODE_ID=${DISPATCHER_NODE_ID}
      - SIDECAR_DISPATCHER=1
    volumes:
      - librenms-data:/data

# ----------------------------------------------------------------------------
# Volumes
# ----------------------------------------------------------------------------
volumes:
  librenms-data:
  librenms-rrd:
  librenms-logs:

# ----------------------------------------------------------------------------
# Networks
# ----------------------------------------------------------------------------
networks:
  monitoring:
    driver: bridge
  proxy:
    external: true 
